<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gym — Jack's Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50:  '#EAF4FF',
              100: '#D2E9FF',
              400: '#409CFF',
              500: '#0A84FF',
              600: '#0066CC',
              700: '#0052A3',
              800: '#003D7A',
              900: '#002952',
            }
          }
        }
      }
    }
  </script>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
    body { font-family: 'Fira Sans', sans-serif; background: #09090b; }
    #sidebar { transition: width 280ms cubic-bezier(.4,0,.2,1); }
    .sidebar-expanded  { width: 240px; }
    .sidebar-collapsed { width: 64px; }
    .nav-label { transition: opacity 200ms ease, width 200ms ease; white-space: nowrap; overflow: hidden; }
    .sidebar-collapsed .nav-label { opacity: 0; width: 0; }
    #mainContent { transition: margin-left 280ms cubic-bezier(.4,0,.2,1); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0c0e; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .bg-ambient { position: fixed; inset: 0; z-index: -10; overflow: hidden; background: #09090b; }
    .bg-ambient .blob { position: absolute; border-radius: 50%; filter: blur(120px); }

    .glass {
      background: rgba(255,255,255,0.055);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .glass-strong {
      background: rgba(255,255,255,0.04);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      backdrop-filter: blur(32px) saturate(160%);
      border-color: rgba(255,255,255,0.10);
    }
  </style>
</head>

<body class="text-white min-h-screen">

  <!-- ─── Ambient backdrop ────────────────────────────────────── -->
  <div class="bg-ambient" aria-hidden="true">
    <div class="blob w-[520px] h-[520px] bg-primary-600/25 -top-48 -left-48"></div>
    <div class="blob w-[420px] h-[420px] bg-primary-500/15 top-1/3 -right-44"></div>
    <div class="blob w-[460px] h-[460px] bg-indigo-500/10 bottom-[-160px] left-1/3"></div>
  </div>

  <!-- ─── Sidebar ─────────────────────────────────────────────── -->
  <aside id="sidebar" class="sidebar-expanded glass-strong fixed top-0 left-0 h-full border-r z-30 flex flex-col select-none">

    <div class="flex items-center gap-3 px-4 py-5 border-b border-white/10">
      <div class="w-8 h-8 rounded-xl bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center flex-shrink-0 shadow-[0_0_18px_rgba(10,132,255,0.45)]">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
      </div>
      <span class="nav-label font-semibold text-white tracking-tight">Jack's Dashboard</span>
    </div>

    <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto">

      <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="nav-label text-sm">Home</span>
      </a>

      <a href="gym.html" aria-current="page"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-primary-300 font-medium bg-primary-500/15 border border-primary-400/25 shadow-[0_0_16px_rgba(10,132,255,0.18)] cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12.75l7.5-7.5 7.5 7.5m-15 6l7.5-7.5 7.5 7.5" />
        </svg>
        <span class="nav-label text-sm">Gym</span>
      </a>

      <a href="finances.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="nav-label text-sm">Finances</span>
      </a>

      <a href="goals.html" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
        </svg>
        <span class="nav-label text-sm">Goals</span>
      </a>

    </nav>

    <div class="border-t border-white/10 p-3">
      <button id="sidebarToggle" onclick="toggleSidebar()"
              class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-white/40 hover:text-white/80 hover:bg-white/8 transition-colors duration-150 cursor-pointer"
              aria-label="Collapse sidebar">
        <svg id="collapseIcon" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
        </svg>
        <span class="nav-label text-xs">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- ─── Main ─────────────────────────────────────────────────── -->
  <div id="mainContent" class="ml-60 min-h-screen flex flex-col">

    <header class="sticky top-0 z-20 glass border-b border-white/10 px-6 py-3 flex items-center justify-between">
      <p id="headerDate" class="text-sm font-medium text-white/55"></p>
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-full bg-gradient-to-br from-primary-400 to-primary-600 flex items-center justify-center text-white text-xs font-semibold shadow-[0_0_14px_rgba(10,132,255,0.4)]">JC</div>
        <span class="text-sm font-medium text-white/80">Jack C.</span>
      </div>
    </header>

    <main class="flex-1 px-6 lg:px-8 py-6 space-y-5">

      <div>
        <h1 class="text-xl font-semibold text-white">Gym</h1>
        <p class="text-sm text-white/45 mt-0.5">Weekly plan vs. what Hevy says you actually did.</p>
      </div>

      <!-- ── Hevy connect (hidden once a key is saved) ──────────── -->
      <div id="hevyConnect" class="glass rounded-3xl p-5">
        <h2 class="text-sm font-semibold text-white/90 mb-1">Connect Hevy</h2>
        <p class="text-xs text-white/45 mb-3">Paste your Hevy API key once — it's saved only in this browser, never in the repo.</p>
        <div class="flex gap-2">
          <input id="hevyApiKey" type="password" placeholder="Hevy API key"
                 class="flex-1 bg-white/5 border border-white/10 rounded-xl px-3 py-2 text-sm text-white placeholder-white/30 focus:outline-none focus:ring-2 focus:ring-primary-400/60 focus:border-primary-400/40" />
          <button onclick="saveHevyKey()"
                  class="px-4 py-2 bg-gradient-to-b from-primary-400 to-primary-600 hover:from-primary-300 hover:to-primary-500 text-white text-sm font-medium rounded-full shadow-[0_4px_16px_rgba(10,132,255,0.35)] transition-colors flex-shrink-0">Save</button>
        </div>
        <p id="hevyStatus" class="text-xs text-white/40 mt-2"></p>
      </div>

      <!-- ── Week strip ──────────────────────────────────────────── -->
      <div class="glass rounded-3xl">
        <div class="px-5 py-4 border-b border-white/10">
          <h2 class="text-sm font-semibold text-white/90">This Week</h2>
        </div>
        <div id="weekStrip" class="grid grid-cols-7 divide-x divide-white/10"></div>
      </div>

      <!-- ── Planned (editable) ──────────────────────────────────── -->
      <div class="glass rounded-3xl">
        <div class="px-5 py-4 border-b border-white/10">
          <h2 class="text-sm font-semibold text-white/90">Planned</h2>
        </div>
        <div id="plannedRow" class="grid grid-cols-7 divide-x divide-white/10"></div>
      </div>

      <!-- ── Actual (from Hevy) ──────────────────────────────────── -->
      <div class="glass rounded-3xl">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10">
          <h2 class="text-sm font-semibold text-white/90">Actual</h2>
          <div class="flex items-center gap-3">
            <button onclick="changeHevyKey()" class="text-xs text-white/35 hover:text-white/70 transition-colors">Change key</button>
            <button onclick="loadHevyWorkouts()" class="text-xs text-primary-400 hover:text-primary-300 transition-colors">Refresh</button>
          </div>
        </div>
        <div id="actualRow" class="grid grid-cols-7 divide-x divide-white/10"></div>
      </div>

    </main>

    <footer class="px-6 py-4 border-t border-white/10">
      <p class="text-xs text-white/30">© 2026 Jack's Dashboard</p>
    </footer>
  </div>

  <script>
    // ── Sidebar ──────────────────────────────────────────────────
    let expanded = true;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('mainContent');
      const icon    = document.getElementById('collapseIcon');
      expanded = !expanded;
      sidebar.classList.toggle('sidebar-expanded',  expanded);
      sidebar.classList.toggle('sidebar-collapsed', !expanded);
      main.classList.toggle('ml-60', expanded);
      main.classList.toggle('ml-16', !expanded);
      icon.innerHTML = expanded
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
      document.getElementById('sidebarToggle').setAttribute('aria-label', expanded ? 'Collapse sidebar' : 'Expand sidebar');
    }

    // ── Date header ──────────────────────────────────────────────
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const today  = new Date(); today.setHours(0,0,0,0);
    document.getElementById('headerDate').textContent =
      `${DAYS[today.getDay()]}, ${MONTHS[today.getMonth()]} ${today.getDate()} ${today.getFullYear()}`;

    // ── Helpers ────────────────────────────────────────────────────
    function esc(str){
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function isoDate(d){
      const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    function isToday(d){ return d.toDateString() === today.toDateString(); }
    function fmtShort(d){ return d.toLocaleDateString('en-US', { month:'short', day:'numeric' }); }

    // ── Current week, Monday → Sunday ─────────────────────────────
    const WEEK_LABELS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    function getMonday(d){
      const dt = new Date(d);
      const dow = dt.getDay(); // 0=Sun..6=Sat
      const diff = dow === 0 ? -6 : 1 - dow;
      dt.setDate(dt.getDate() + diff);
      return dt;
    }
    const monday = getMonday(today);
    const weekDates = WEEK_LABELS.map((_, i) => {
      const d = new Date(monday); d.setDate(monday.getDate() + i); return d;
    });

    // ── Week strip ─────────────────────────────────────────────────
    function renderWeekStrip(){
      const el = document.getElementById('weekStrip');
      el.innerHTML = WEEK_LABELS.map((label, i) => {
        const d = weekDates[i];
        const t = isToday(d);
        return `<div class="p-4 text-center ${t ? 'bg-primary-500/10' : ''}">
          <p class="text-xs font-semibold ${t ? 'text-primary-300' : 'text-white/45'}">${label}</p>
          <p class="text-sm ${t ? 'text-white' : 'text-white/55'} mt-1">${fmtShort(d)}</p>
        </div>`;
      }).join('');
    }

    // ── Planned row (editable, persisted per weekday) ──────────────
    const PLAN_KEY = 'gym_plan';
    function loadPlan(){ try { return JSON.parse(localStorage.getItem(PLAN_KEY)) || {}; } catch { return {}; } }
    function savePlan(plan){ localStorage.setItem(PLAN_KEY, JSON.stringify(plan)); }

    function renderPlanned(){
      const plan = loadPlan();
      const el = document.getElementById('plannedRow');
      el.innerHTML = WEEK_LABELS.map((label, i) => {
        const t = isToday(weekDates[i]);
        return `<div class="p-3 ${t ? 'bg-primary-500/10' : ''}">
          <p class="text-xs font-semibold ${t ? 'text-primary-300' : 'text-white/45'} text-center mb-2">${label}</p>
          <input data-day="${label}" value="${esc(plan[label] || '')}" placeholder="—"
                 class="w-full bg-white/5 border border-white/10 rounded-lg px-2 py-1.5 text-xs text-white text-center placeholder-white/25 focus:outline-none focus:ring-2 focus:ring-primary-400/50 focus:border-primary-400/40" />
        </div>`;
      }).join('');

      el.querySelectorAll('input[data-day]').forEach(input => {
        input.addEventListener('change', () => {
          const p = loadPlan();
          p[input.dataset.day] = input.value.trim();
          savePlan(p);
        });
      });
    }

    // ── Hevy connection + actual workouts ───────────────────────────
    const HEVY_KEY = 'hevy_api_key';
    function loadHevyKey(){ return localStorage.getItem(HEVY_KEY) || ''; }
    function saveHevyKeyToStorage(k){ localStorage.setItem(HEVY_KEY, k); }

    function dayCell(label, d, contentHtml){
      const t = isToday(d);
      return `<div class="p-3 text-center ${t ? 'bg-primary-500/10' : ''}">
        <p class="text-xs font-semibold ${t ? 'text-primary-300' : 'text-white/45'} mb-1.5">${label}</p>
        ${contentHtml}
      </div>`;
    }

    function placeholderContent(text){
      return `<p class="text-xs text-white/25 leading-snug">${esc(text)}</p>`;
    }

    function workoutsContent(entries){
      if(!entries || entries.length === 0) return placeholderContent('—');
      return entries.map(e => `
        <div class="mb-2 last:mb-0">
          <p class="text-xs text-white/75 leading-snug">${esc(e.title)}</p>
          <p class="text-[10px] text-white/40 font-mono mt-0.5">${e.volume.toLocaleString()} kg</p>
        </div>`).join('');
    }

    function renderActualPlaceholder(text){
      const el = document.getElementById('actualRow');
      el.innerHTML = WEEK_LABELS.map((label, i) => dayCell(label, weekDates[i], placeholderContent(text))).join('');
    }

    async function loadHevyWorkouts(){
      const key = loadHevyKey();
      if(!key){
        renderActualPlaceholder('Connect Hevy');
        return;
      }
      renderActualPlaceholder('Loading…');

      try {
        const res = await fetch('/api/hevy', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ apiKey: key })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || ('Request failed: '+res.status));

        const workouts = data.workouts || [];
        const byDate = {};
        workouts.forEach(w => {
          const raw = w.start_time || w.created_at;
          if(!raw) return;
          const key = isoDate(new Date(raw));
          if(!byDate[key]) byDate[key] = [];
          byDate[key].push({ title: w.title || 'Workout', volume: w.volume_kg || 0 });
        });

        const el = document.getElementById('actualRow');
        el.innerHTML = WEEK_LABELS.map((label, i) => {
          const d = weekDates[i];
          const entries = byDate[isoDate(d)] || [];
          return dayCell(label, d, workoutsContent(entries));
        }).join('');
      } catch(e){
        const el = document.getElementById('actualRow');
        el.innerHTML = `<div class="col-span-7 p-4 text-center text-xs text-red-400">Error: ${esc(e.message)}</div>`;
      }
    }

    function initHevyConnect(){
      const connectEl = document.getElementById('hevyConnect');
      if(loadHevyKey()) connectEl.classList.add('hidden');
      else connectEl.classList.remove('hidden');
    }

    function saveHevyKey(){
      const input = document.getElementById('hevyApiKey');
      const key = input.value.trim();
      const status = document.getElementById('hevyStatus');
      if(!key){ status.textContent = 'Enter your Hevy API key.'; return; }
      saveHevyKeyToStorage(key);
      status.textContent = '';
      document.getElementById('hevyConnect').classList.add('hidden');
      loadHevyWorkouts();
    }

    function changeHevyKey(){
      document.getElementById('hevyApiKey').value = loadHevyKey();
      document.getElementById('hevyConnect').classList.remove('hidden');
    }

    // ── Init ─────────────────────────────────────────────────────
    renderWeekStrip();
    renderPlanned();
    initHevyConnect();
    loadHevyWorkouts();
  </script>

</body>
</html>
