<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals — Jack's Dashboard</title>
  <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50:  '#EAF4FF',
              100: '#D2E9FF',
              400: '#409CFF',
              500: '#0A84FF',
              600: '#0066CC',
              700: '#0052A3',
              800: '#003D7A',
              900: '#002952',
            }
          }
        }
      }
    }
  </script>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
    body { font-family: 'Fira Sans', sans-serif; background: #09090b; }
    #sidebar { transition: width 280ms cubic-bezier(.4,0,.2,1); }
    .sidebar-expanded  { width: 240px; }
    .sidebar-collapsed { width: 64px; }
    .nav-label { transition: opacity 200ms ease, width 200ms ease; white-space: nowrap; overflow: hidden; }
    .sidebar-collapsed .nav-label { opacity: 0; width: 0; }
    #mainContent { transition: margin-left 280ms cubic-bezier(.4,0,.2,1); }

    /* ── Phone layout: sidebar becomes a horizontal top bar ─────── */
    @media (max-width: 639px) {
      #sidebar {
        width: 100% !important;
        height: 4rem;
        left: 0;
        right: 0;
        flex-direction: row;
        border-right: 0;
        border-bottom-width: 1px;
      }
      #sidebar > div:first-child,
      #sidebar > div:last-child { display: none; }
      #sidebar nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-evenly;
        padding: 0 0.5rem;
        overflow-x: auto;
        overflow-y: hidden;
      }
      #sidebar nav > a { margin-top: 0; }
      #sidebar .nav-label { display: none; }
      #mainContent { margin-left: 0 !important; margin-top: 4rem; }
      #mainContent > header { top: 4rem; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0c0e; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    .bg-ambient { position: fixed; inset: 0; z-index: -10; overflow: hidden; background: #09090b; }
    .bg-ambient .blob { position: absolute; border-radius: 50%; filter: blur(120px); }

    .glass {
      background: rgba(255,255,255,0.055);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .glass-strong {
      background: rgba(255,255,255,0.04);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      backdrop-filter: blur(32px) saturate(160%);
      border-color: rgba(255,255,255,0.10);
    }

    #detailPanel {
      transform: translateX(100%);
      transition: transform 320ms cubic-bezier(.4,0,.2,1);
    }
    #detailPanel.open { transform: translateX(0); }

    #overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }
    #overlay.open { opacity: 1; pointer-events: auto; }
  </style>
  <link rel="stylesheet" href="theme.css" />
</head>

  <script>
    // ── Sidebar ──────────────────────────────────────────────────
    let expanded = false;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('mainContent');
      const icon    = document.getElementById('collapseIcon');
      expanded = !expanded;
      sidebar.classList.toggle('sidebar-expanded',  expanded);
      sidebar.classList.toggle('sidebar-collapsed', !expanded);
      main.classList.toggle('ml-60', expanded);
      main.classList.toggle('ml-16', !expanded);
      icon.innerHTML = expanded
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
      document.getElementById('sidebarToggle').setAttribute('aria-label', expanded ? 'Collapse sidebar' : 'Expand sidebar');
    }

    // ── Date header ──────────────────────────────────────────────
    const now    = new Date();
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    // Display format for all dates: DD-MM-YY (stored data stays ISO for sorting/sync)
    function fmtDMY(d){
      const dt = d instanceof Date ? d : new Date(/^\d{4}-\d{2}-\d{2}$/.test(String(d)) ? d + 'T00:00:00' : d);
      if (isNaN(dt)) return String(d);
      const p = n => String(n).padStart(2, '0');
      return `${p(dt.getDate())}-${p(dt.getMonth()+1)}-${String(dt.getFullYear()).slice(-2)}`;
    }
    document.getElementById('headerDate').textContent =
      `${DAYS[now.getDay()]}, ${fmtDMY(now)}`;

    // ── Supabase ─────────────────────────────────────────────────
    let supabaseClient = null;
    let goalsCache = [];

    function dbToLocal(row) {
      return {
        id:        row.id,
        title:     row.title,
        type:      row.type,
        created:   row.created,
        due:       row.due || null,
        stepsDone: row.steps_done || [],
        stepsNext: row.steps_next || [],
      };
    }

    async function initSupabase() {
      try {
        const cfgRes = await fetch('/api/config');
        const cfg = await cfgRes.json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('Supabase is not configured');
        supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
        await loadGoals();
        supabaseClient
          .channel('goals-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'goals' }, () => loadGoals())
          .subscribe();
      } catch (e) {
        document.getElementById('list-long').innerHTML =
          `<p class="text-sm text-red-400 text-center py-8">Couldn't connect: ${esc(e.message)}</p>`;
        document.getElementById('list-short').innerHTML = '';
      }
    }

    async function loadGoals() {
      const { data, error } = await supabaseClient
        .from('goals')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) { console.error('Load goals failed:', error); return; }
      goalsCache = (data || []).map(dbToLocal);
      renderAll();
      if (activeId) refreshPanel();
    }

    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    function today() {
      const d = new Date(); d.setHours(0,0,0,0); return d;
    }

    function progressInfo(goal) {
      if (!goal.due) return null;
      const start    = parseDate(goal.created).getTime();
      const end      = parseDate(goal.due).getTime();
      const now      = today().getTime();
      const total    = end - start;
      if (total <= 0) return null;
      const elapsed  = now - start;
      const pct      = Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
      const daysLeft = Math.round((end - now) / 86400000);
      return { pct, daysLeft };
    }

    function barColor(pct, daysLeft) {
      if (daysLeft < 0)  return 'bg-red-500';
      if (pct >= 85)     return 'bg-amber-500';
      if (pct >= 60)     return 'bg-yellow-400';
      return 'bg-emerald-500';
    }

    function progressBlock(goal) {
      const info = progressInfo(goal);
      if (!info) return '';
      const { pct, daysLeft } = info;
      const color  = barColor(pct, daysLeft);
      const label  = daysLeft < 0  ? `${Math.abs(daysLeft)} days overdue`
                   : daysLeft === 0 ? 'Due today'
                   : `${daysLeft} day${daysLeft !== 1 ? 's' : ''} left`;
      const dueFmt = fmtDMY(parseDate(goal.due));
      return `
        <div class="mt-3">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[11px] text-white/35">Due ${dueFmt}</span>
            <span class="text-[11px] font-medium ${daysLeft < 0 ? 'text-red-400' : 'text-white/45'}">${label}</span>
          </div>
          <div class="w-full h-1.5 bg-white/10 rounded-full overflow-hidden">
            <div class="h-full ${color} rounded-full transition-all duration-500" style="width:${pct}%"></div>
          </div>
          <p class="text-[10px] text-white/25 mt-1 text-right font-mono">${pct}% of time elapsed</p>
        </div>`;
    }

    // ── Render columns ───────────────────────────────────────────
    function renderAll() {
      renderColumn('long',  goalsCache.filter(g => g.type === 'long'));
      renderColumn('short', goalsCache.filter(g => g.type === 'short'));
    }

    function renderColumn(type, goals) {
      const el = document.getElementById(`list-${type}`);
      if (!goals.length) {
        el.innerHTML = `<p class="text-sm text-white/30 text-center py-8">No ${type}-term goals yet.</p>`;
        return;
      }
      el.innerHTML = goals.map(g => `
        <div onclick="openDetail('${g.id}')"
             class="glass rounded-2xl p-4 cursor-pointer hover:bg-white/10 transition-colors group">
          <div class="flex items-start justify-between gap-2">
            <p class="text-sm font-medium text-white/90 group-hover:text-white transition-colors leading-snug">${esc(g.title)}</p>
            <svg class="w-4 h-4 text-white/25 group-hover:text-white/55 flex-shrink-0 mt-0.5 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
          <div class="flex items-center gap-2 mt-1.5 text-xs text-white/40">
            <span>${g.stepsDone.length} step${g.stepsDone.length !== 1 ? 's' : ''} taken</span>
            <span class="text-white/15">·</span>
            <span>${g.stepsNext.length} upcoming</span>
          </div>
          ${progressBlock(g)}
        </div>`).join('');
    }

    // ── Add form ─────────────────────────────────────────────────
    function showAddForm(type) {
      document.getElementById(`addForm-${type}`).classList.remove('hidden');
      setTimeout(() => document.getElementById(`title-${type}`).focus(), 50);
    }
    function hideAddForm(type) {
      document.getElementById(`addForm-${type}`).classList.add('hidden');
      document.getElementById(`title-${type}`).value = '';
      document.getElementById(`due-${type}`).value = '';
    }
    async function submitGoal(type) {
      const title = document.getElementById(`title-${type}`).value.trim();
      if (!title || !supabaseClient) return;
      const due     = document.getElementById(`due-${type}`).value || null;
      const created = new Date().toISOString().split('T')[0];
      const { error } = await supabaseClient
        .from('goals')
        .insert({ title, type, created, due, steps_done: [], steps_next: [] });
      if (error) { console.error('Insert goal failed:', error); return; }
      hideAddForm(type);
      await loadGoals();
    }
    ['long','short'].forEach(t => {
      document.getElementById(`title-${t}`).addEventListener('keydown', e => {
        if (e.key === 'Enter') submitGoal(t);
      });
    });

    // ── Detail panel ─────────────────────────────────────────────
    let activeId = null;

    function openDetail(id) {
      activeId = id;
      refreshPanel();
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }

    function refreshPanel() {
      const g = goalsCache.find(x => x.id === activeId);
      if (!g) return;

      document.getElementById('panelTitle').textContent = g.title;

      // Progress
      const info = progressInfo(g);
      let statusHtml, barHtml;
      if (info) {
        const { pct, daysLeft } = info;
        const color = barColor(pct, daysLeft);
        const label = daysLeft < 0  ? `${Math.abs(daysLeft)} days overdue`
                    : daysLeft === 0 ? 'Due today'
                    : `${daysLeft} day${daysLeft !== 1 ? 's' : ''} left`;
        statusHtml = `<span class="text-xs font-semibold ${daysLeft < 0 ? 'text-red-400' : 'text-white/75'}">${label}</span>`;
        barHtml = `
          <div class="w-full h-2 bg-white/10 rounded-full overflow-hidden mt-3">
            <div class="h-full ${color} rounded-full transition-all duration-500" style="width:${pct}%"></div>
          </div>
          <p class="text-[11px] text-white/25 mt-1.5 text-right font-mono">${pct}% of time elapsed</p>`;
      } else {
        statusHtml = '<span class="text-xs text-white/30">No due date set</span>';
        barHtml = '';
      }

      document.getElementById('panelProgress').innerHTML = `
        <div class="flex items-center justify-between gap-3">
          <label class="text-xs text-white/40 flex items-center gap-2 flex-shrink-0">
            Due
            <input id="panelDueInput" type="date" value="${g.due || ''}"
                   class="bg-white/5 border border-white/10 rounded-lg px-2 py-1 text-xs text-white/80 focus:outline-none focus:ring-2 focus:ring-primary-400/50 focus:border-primary-400/40" />
          </label>
          ${statusHtml}
        </div>
        ${barHtml}`;

      document.getElementById('panelDueInput').addEventListener('change', async e => {
        if (!supabaseClient) return;
        const due = e.target.value || null;
        const { error } = await supabaseClient.from('goals').update({ due }).eq('id', activeId);
        if (error) { console.error('Update due failed:', error); return; }
        await loadGoals();
      });

      // Steps
      document.getElementById('stepsDone').innerHTML = g.stepsDone.length
        ? g.stepsDone.map((s, i) => `
            <div class="flex items-start gap-2.5 group/step">
              <svg class="w-4 h-4 text-emerald-400 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              <span class="text-sm text-white/75 flex-1 leading-snug">${esc(s)}</span>
              <button onclick="removeStep('done',${i})"
                      class="opacity-0 group-hover/step:opacity-100 p-0.5 text-white/25 hover:text-red-400 transition-all flex-shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>`).join('')
        : '<p class="text-xs text-white/30">No steps logged yet.</p>';

      document.getElementById('stepsNext').innerHTML = g.stepsNext.length
        ? g.stepsNext.map((s, i) => `
            <div class="flex items-start gap-2.5 group/step">
              <svg class="w-4 h-4 text-primary-400 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
              <span class="text-sm text-white/75 flex-1 leading-snug">${esc(s)}</span>
              <button onclick="removeStep('next',${i})"
                      class="opacity-0 group-hover/step:opacity-100 p-0.5 text-white/25 hover:text-red-400 transition-all flex-shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>`).join('')
        : '<p class="text-xs text-white/30">No upcoming steps yet.</p>';
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      activeId = null;
    }

    async function addStep(section) {
      const inputId = section === 'done' ? 'newDoneStep' : 'newNextStep';
      const input   = document.getElementById(inputId);
      const text    = input.value.trim();
      if (!text || !activeId || !supabaseClient) return;
      const g = goalsCache.find(x => x.id === activeId);
      if (!g) return;
      const steps_done = section === 'done' ? [...g.stepsDone, text] : g.stepsDone;
      const steps_next = section === 'next' ? [...g.stepsNext, text] : g.stepsNext;
      const { error } = await supabaseClient.from('goals').update({ steps_done, steps_next }).eq('id', activeId);
      if (error) { console.error('Add step failed:', error); return; }
      input.value = '';
      await loadGoals();
    }

    async function removeStep(section, idx) {
      const g = goalsCache.find(x => x.id === activeId);
      if (!g || !supabaseClient) return;
      const steps_done = section === 'done' ? g.stepsDone.filter((_, i) => i !== idx) : g.stepsDone;
      const steps_next = section === 'next' ? g.stepsNext.filter((_, i) => i !== idx) : g.stepsNext;
      const { error } = await supabaseClient.from('goals').update({ steps_done, steps_next }).eq('id', activeId);
      if (error) { console.error('Remove step failed:', error); return; }
      await loadGoals();
    }

    async function deleteActiveGoal() {
      if (!activeId || !confirm('Delete this goal?') || !supabaseClient) return;
      const { error } = await supabaseClient.from('goals').delete().eq('id', activeId);
      if (error) { console.error('Delete goal failed:', error); return; }
      closeDetail();
      await loadGoals();
    }

    // Enter key for step inputs
    document.getElementById('newDoneStep').addEventListener('keydown', e => { if (e.key === 'Enter') addStep('done'); });
    document.getElementById('newNextStep').addEventListener('keydown', e => { if (e.key === 'Enter') addStep('next'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // ── XSS guard ────────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────
    initSupabase();
  </script>

</body>
</html>
