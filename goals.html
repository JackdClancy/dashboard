<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Goals — Jack's Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50:  '#EFF6FF',
              100: '#DBEAFE',
              400: '#60A5FA',
              500: '#3B82F6',
              600: '#2563EB',
              700: '#1D4ED8',
              800: '#1E40AF',
              900: '#1E3A8A',
            }
          }
        }
      }
    }
  </script>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }
    body { font-family: 'Fira Sans', sans-serif; }
    #sidebar { transition: width 280ms cubic-bezier(.4,0,.2,1); }
    .sidebar-expanded  { width: 240px; }
    .sidebar-collapsed { width: 64px; }
    .nav-label { transition: opacity 200ms ease, width 200ms ease; white-space: nowrap; overflow: hidden; }
    .sidebar-collapsed .nav-label { opacity: 0; width: 0; }
    #mainContent { transition: margin-left 280ms cubic-bezier(.4,0,.2,1); }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }

    #detailPanel {
      transform: translateX(100%);
      transition: transform 320ms cubic-bezier(.4,0,.2,1);
    }
    #detailPanel.open { transform: translateX(0); }

    #overlay {
      opacity: 0;
      pointer-events: none;
      transition: opacity 300ms ease;
    }
    #overlay.open { opacity: 1; pointer-events: auto; }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

  <!-- ─── Sidebar ─────────────────────────────────────────────── -->
  <aside id="sidebar" class="sidebar-expanded fixed top-0 left-0 h-full bg-slate-900 border-r border-slate-800 z-30 flex flex-col select-none">

    <div class="flex items-center gap-3 px-4 py-5 border-b border-slate-800">
      <div class="w-8 h-8 rounded-lg bg-primary-700 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
      </div>
      <span class="nav-label font-semibold text-slate-100 tracking-tight">Jack's Dashboard</span>
    </div>

    <nav class="flex-1 px-2 py-4 space-y-0.5 overflow-y-auto">

      <a href="index.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="nav-label text-sm">Home</span>
      </a>

      <a href="gym.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12.75l7.5-7.5 7.5 7.5m-15 6l7.5-7.5 7.5 7.5" />
        </svg>
        <span class="nav-label text-sm">Gym</span>
      </a>

      <a href="finances.html" class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="nav-label text-sm">Finances</span>
      </a>

      <a href="goals.html" aria-current="page"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-primary-400 font-medium bg-primary-900/30 border-l-2 border-primary-500 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
        </svg>
        <span class="nav-label text-sm">Goals</span>
      </a>

    </nav>

    <div class="border-t border-slate-800 p-3">
      <button id="sidebarToggle" onclick="toggleSidebar()"
              class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-slate-500 hover:text-slate-300 hover:bg-slate-800 transition-colors duration-150 cursor-pointer"
              aria-label="Collapse sidebar">
        <svg id="collapseIcon" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
        </svg>
        <span class="nav-label text-xs">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- ─── Main ─────────────────────────────────────────────────── -->
  <div id="mainContent" class="ml-60 min-h-screen flex flex-col">

    <header class="sticky top-0 z-20 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 px-6 py-3 flex items-center justify-between">
      <p id="headerDate" class="text-sm font-medium text-slate-400"></p>
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-full bg-primary-700 flex items-center justify-center text-white text-xs font-semibold">JC</div>
        <span class="text-sm font-medium text-slate-300">Jack C.</span>
      </div>
    </header>

    <main class="flex-1 px-6 lg:px-8 py-6">

      <div class="mb-6">
        <h1 class="text-xl font-semibold text-slate-100">Goals</h1>
        <p class="text-sm text-slate-500 mt-0.5">Track what you're working toward.</p>
      </div>

      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 items-start">

        <!-- Long-term column -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Long-Term</h2>
            <button onclick="showAddForm('long')"
                    class="flex items-center gap-1 text-xs font-medium text-primary-400 hover:text-primary-300 transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Add goal
            </button>
          </div>

          <!-- Add form -->
          <div id="addForm-long" class="hidden mb-3 bg-slate-900 rounded-xl border border-slate-700 p-4 space-y-3">
            <input id="title-long" type="text" placeholder="Goal title"
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-600" />
            <div class="flex items-center gap-3">
              <label class="text-xs text-slate-500 whitespace-nowrap">Due date</label>
              <input id="due-long" type="date"
                     class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-primary-600" />
            </div>
            <div class="flex gap-2 justify-end">
              <button onclick="hideAddForm('long')" class="px-3 py-1.5 text-xs text-slate-400 hover:text-slate-200 transition-colors">Cancel</button>
              <button onclick="submitGoal('long')" class="px-4 py-1.5 text-xs font-medium bg-primary-700 hover:bg-primary-600 text-white rounded-lg transition-colors">Save</button>
            </div>
          </div>

          <div id="list-long" class="space-y-3"></div>
        </div>

        <!-- Short-term column -->
        <div>
          <div class="flex items-center justify-between mb-3">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-widest">Short-Term</h2>
            <button onclick="showAddForm('short')"
                    class="flex items-center gap-1 text-xs font-medium text-primary-400 hover:text-primary-300 transition-colors">
              <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 4v16m8-8H4"/>
              </svg>
              Add goal
            </button>
          </div>

          <!-- Add form -->
          <div id="addForm-short" class="hidden mb-3 bg-slate-900 rounded-xl border border-slate-700 p-4 space-y-3">
            <input id="title-short" type="text" placeholder="Goal title"
                   class="w-full bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-600" />
            <div class="flex items-center gap-3">
              <label class="text-xs text-slate-500 whitespace-nowrap">Due date</label>
              <input id="due-short" type="date"
                     class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-1.5 text-sm text-slate-300 focus:outline-none focus:ring-2 focus:ring-primary-600" />
            </div>
            <div class="flex gap-2 justify-end">
              <button onclick="hideAddForm('short')" class="px-3 py-1.5 text-xs text-slate-400 hover:text-slate-200 transition-colors">Cancel</button>
              <button onclick="submitGoal('short')" class="px-4 py-1.5 text-xs font-medium bg-primary-700 hover:bg-primary-600 text-white rounded-lg transition-colors">Save</button>
            </div>
          </div>

          <div id="list-short" class="space-y-3"></div>
        </div>

      </div>
    </main>

    <footer class="px-6 py-4 border-t border-slate-800">
      <p class="text-xs text-slate-600">© 2026 Jack's Dashboard</p>
    </footer>
  </div>

  <!-- ─── Overlay ───────────────────────────────────────────────── -->
  <div id="overlay" onclick="closeDetail()" class="fixed inset-0 bg-black/60 z-40"></div>

  <!-- ─── Detail slide panel ───────────────────────────────────── -->
  <div id="detailPanel" class="fixed top-0 right-0 h-full w-full sm:w-[480px] bg-slate-900 border-l border-slate-800 z-50 flex flex-col">

    <!-- Panel header -->
    <div class="flex items-center gap-3 px-5 py-4 border-b border-slate-800 flex-shrink-0">
      <button onclick="closeDetail()"
              class="p-1.5 rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors"
              aria-label="Close">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
        </svg>
      </button>
      <h2 id="panelTitle" class="text-sm font-semibold text-slate-100 truncate flex-1"></h2>
      <button id="deleteGoalBtn" onclick="deleteActiveGoal()"
              class="p-1.5 rounded-lg text-slate-600 hover:text-red-400 hover:bg-slate-800 transition-colors"
              aria-label="Delete goal">
        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16"/>
        </svg>
      </button>
    </div>

    <!-- Progress bar -->
    <div id="panelProgress" class="px-5 py-4 border-b border-slate-800 flex-shrink-0"></div>

    <!-- Scrollable body -->
    <div class="flex-1 overflow-y-auto px-5 py-5 space-y-7">

      <!-- Steps taken -->
      <div>
        <h3 class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest mb-3">Steps Taken</h3>
        <div id="stepsDone" class="space-y-2.5 mb-3"></div>
        <div class="flex gap-2">
          <input id="newDoneStep" type="text" placeholder="Add a completed step…"
                 class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-600" />
          <button onclick="addStep('done')"
                  class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-medium rounded-lg transition-colors flex-shrink-0">Add</button>
        </div>
      </div>

      <!-- Next steps -->
      <div>
        <h3 class="text-[11px] font-semibold text-slate-500 uppercase tracking-widest mb-3">Next Steps</h3>
        <div id="stepsNext" class="space-y-2.5 mb-3"></div>
        <div class="flex gap-2">
          <input id="newNextStep" type="text" placeholder="Add an upcoming step…"
                 class="flex-1 bg-slate-800 border border-slate-700 rounded-lg px-3 py-2 text-sm text-slate-100 placeholder-slate-500 focus:outline-none focus:ring-2 focus:ring-primary-600" />
          <button onclick="addStep('next')"
                  class="px-3 py-2 bg-slate-700 hover:bg-slate-600 text-slate-200 text-xs font-medium rounded-lg transition-colors flex-shrink-0">Add</button>
        </div>
      </div>

    </div>
  </div>

  <script>
    // ── Sidebar ──────────────────────────────────────────────────
    let expanded = true;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('mainContent');
      const icon    = document.getElementById('collapseIcon');
      expanded = !expanded;
      sidebar.classList.toggle('sidebar-expanded',  expanded);
      sidebar.classList.toggle('sidebar-collapsed', !expanded);
      main.classList.toggle('ml-60', expanded);
      main.classList.toggle('ml-16', !expanded);
      icon.innerHTML = expanded
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
      document.getElementById('sidebarToggle').setAttribute('aria-label', expanded ? 'Collapse sidebar' : 'Expand sidebar');
    }

    // ── Date header ──────────────────────────────────────────────
    const now    = new Date();
    const DAYS   = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    document.getElementById('headerDate').textContent =
      `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

    // ── Data helpers ─────────────────────────────────────────────
    const KEY = 'jd_goals';
    function loadGoals() {
      try { return JSON.parse(localStorage.getItem(KEY)) || []; } catch { return []; }
    }
    function saveGoals(goals) { localStorage.setItem(KEY, JSON.stringify(goals)); }

    // Parse YYYY-MM-DD as a local date (avoids UTC off-by-one)
    function parseDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }

    // Today at midnight local time
    function today() {
      const d = new Date(); d.setHours(0,0,0,0); return d;
    }

    function progressInfo(goal) {
      if (!goal.due) return null;
      const start    = parseDate(goal.created).getTime();
      const end      = parseDate(goal.due).getTime();
      const now      = today().getTime();
      const total    = end - start;
      if (total <= 0) return null;
      const elapsed  = now - start;
      const pct      = Math.min(100, Math.max(0, Math.round((elapsed / total) * 100)));
      const daysLeft = Math.round((end - now) / 86400000);
      return { pct, daysLeft };
    }

    function barColor(pct, daysLeft) {
      if (daysLeft < 0)  return 'bg-red-500';
      if (pct >= 85)     return 'bg-amber-500';
      if (pct >= 60)     return 'bg-yellow-400';
      return 'bg-emerald-500';
    }

    function progressBlock(goal) {
      const info = progressInfo(goal);
      if (!info) return '';
      const { pct, daysLeft } = info;
      const color  = barColor(pct, daysLeft);
      const label  = daysLeft < 0  ? `${Math.abs(daysLeft)} days overdue`
                   : daysLeft === 0 ? 'Due today'
                   : `${daysLeft} day${daysLeft !== 1 ? 's' : ''} left`;
      const dueFmt = parseDate(goal.due).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
      return `
        <div class="mt-3">
          <div class="flex items-center justify-between mb-1.5">
            <span class="text-[11px] text-slate-500">Due ${dueFmt}</span>
            <span class="text-[11px] font-medium ${daysLeft < 0 ? 'text-red-400' : 'text-slate-400'}">${label}</span>
          </div>
          <div class="w-full h-1.5 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full ${color} rounded-full transition-all duration-500" style="width:${pct}%"></div>
          </div>
          <p class="text-[10px] text-slate-600 mt-1 text-right font-mono">${pct}% of time elapsed</p>
        </div>`;
    }

    // ── Render columns ───────────────────────────────────────────
    function renderAll() {
      const goals = loadGoals();
      renderColumn('long',  goals.filter(g => g.type === 'long'));
      renderColumn('short', goals.filter(g => g.type === 'short'));
    }

    function renderColumn(type, goals) {
      const el = document.getElementById(`list-${type}`);
      if (!goals.length) {
        el.innerHTML = `<p class="text-sm text-slate-600 text-center py-8">No ${type}-term goals yet.</p>`;
        return;
      }
      el.innerHTML = goals.map(g => `
        <div onclick="openDetail('${g.id}')"
             class="bg-slate-900 rounded-xl border border-slate-800 p-4 cursor-pointer hover:border-slate-600 transition-colors group">
          <div class="flex items-start justify-between gap-2">
            <p class="text-sm font-medium text-slate-200 group-hover:text-white transition-colors leading-snug">${esc(g.title)}</p>
            <svg class="w-4 h-4 text-slate-600 group-hover:text-slate-400 flex-shrink-0 mt-0.5 transition-colors" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
            </svg>
          </div>
          <div class="flex items-center gap-2 mt-1.5 text-xs text-slate-500">
            <span>${g.stepsDone.length} step${g.stepsDone.length !== 1 ? 's' : ''} taken</span>
            <span class="text-slate-700">·</span>
            <span>${g.stepsNext.length} upcoming</span>
          </div>
          ${progressBlock(g)}
        </div>`).join('');
    }

    // ── Add form ─────────────────────────────────────────────────
    function showAddForm(type) {
      document.getElementById(`addForm-${type}`).classList.remove('hidden');
      setTimeout(() => document.getElementById(`title-${type}`).focus(), 50);
    }
    function hideAddForm(type) {
      document.getElementById(`addForm-${type}`).classList.add('hidden');
      document.getElementById(`title-${type}`).value = '';
      document.getElementById(`due-${type}`).value = '';
    }
    function submitGoal(type) {
      const title = document.getElementById(`title-${type}`).value.trim();
      if (!title) return;
      const due = document.getElementById(`due-${type}`).value || null;
      const goals = loadGoals();
      goals.push({
        id:        Date.now().toString(),
        title,
        type,
        created:   now.toISOString().split('T')[0],
        due,
        stepsDone: [],
        stepsNext: []
      });
      saveGoals(goals);
      hideAddForm(type);
      renderAll();
    }
    ['long','short'].forEach(t => {
      document.getElementById(`title-${t}`).addEventListener('keydown', e => {
        if (e.key === 'Enter') submitGoal(t);
      });
    });

    // ── Detail panel ─────────────────────────────────────────────
    let activeId = null;

    function openDetail(id) {
      activeId = id;
      refreshPanel();
      document.getElementById('detailPanel').classList.add('open');
      document.getElementById('overlay').classList.add('open');
    }

    function refreshPanel() {
      const g = loadGoals().find(x => x.id === activeId);
      if (!g) return;

      document.getElementById('panelTitle').textContent = g.title;

      // Progress
      const info = progressInfo(g);
      if (info) {
        const { pct, daysLeft } = info;
        const color  = barColor(pct, daysLeft);
        const label  = daysLeft < 0  ? `${Math.abs(daysLeft)} days overdue`
                     : daysLeft === 0 ? 'Due today'
                     : `${daysLeft} day${daysLeft !== 1 ? 's' : ''} left`;
        const dueFmt = parseDate(g.due).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
        document.getElementById('panelProgress').innerHTML = `
          <div class="flex items-center justify-between mb-2">
            <span class="text-xs text-slate-500">Due ${dueFmt}</span>
            <span class="text-xs font-semibold ${daysLeft < 0 ? 'text-red-400' : 'text-slate-300'}">${label}</span>
          </div>
          <div class="w-full h-2 bg-slate-800 rounded-full overflow-hidden">
            <div class="h-full ${color} rounded-full transition-all duration-500" style="width:${pct}%"></div>
          </div>
          <p class="text-[11px] text-slate-600 mt-1.5 text-right font-mono">${pct}% of time elapsed</p>`;
      } else {
        document.getElementById('panelProgress').innerHTML =
          '<p class="text-xs text-slate-600">No due date set.</p>';
      }

      // Steps
      document.getElementById('stepsDone').innerHTML = g.stepsDone.length
        ? g.stepsDone.map((s, i) => `
            <div class="flex items-start gap-2.5 group/step">
              <svg class="w-4 h-4 text-emerald-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7"/>
              </svg>
              <span class="text-sm text-slate-300 flex-1 leading-snug">${esc(s)}</span>
              <button onclick="removeStep('done',${i})"
                      class="opacity-0 group-hover/step:opacity-100 p-0.5 text-slate-600 hover:text-red-400 transition-all flex-shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>`).join('')
        : '<p class="text-xs text-slate-600">No steps logged yet.</p>';

      document.getElementById('stepsNext').innerHTML = g.stepsNext.length
        ? g.stepsNext.map((s, i) => `
            <div class="flex items-start gap-2.5 group/step">
              <svg class="w-4 h-4 text-primary-500 mt-0.5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/>
              </svg>
              <span class="text-sm text-slate-300 flex-1 leading-snug">${esc(s)}</span>
              <button onclick="removeStep('next',${i})"
                      class="opacity-0 group-hover/step:opacity-100 p-0.5 text-slate-600 hover:text-red-400 transition-all flex-shrink-0">
                <svg class="w-3.5 h-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12"/>
                </svg>
              </button>
            </div>`).join('')
        : '<p class="text-xs text-slate-600">No upcoming steps yet.</p>';
    }

    function closeDetail() {
      document.getElementById('detailPanel').classList.remove('open');
      document.getElementById('overlay').classList.remove('open');
      activeId = null;
    }

    function addStep(section) {
      const inputId = section === 'done' ? 'newDoneStep' : 'newNextStep';
      const input   = document.getElementById(inputId);
      const text    = input.value.trim();
      if (!text || !activeId) return;
      const goals = loadGoals();
      const g = goals.find(x => x.id === activeId);
      if (!g) return;
      if (section === 'done') g.stepsDone.push(text);
      else                    g.stepsNext.push(text);
      saveGoals(goals);
      input.value = '';
      refreshPanel();
      renderAll();
    }

    function removeStep(section, idx) {
      const goals = loadGoals();
      const g = goals.find(x => x.id === activeId);
      if (!g) return;
      if (section === 'done') g.stepsDone.splice(idx, 1);
      else                    g.stepsNext.splice(idx, 1);
      saveGoals(goals);
      refreshPanel();
      renderAll();
    }

    function deleteActiveGoal() {
      if (!activeId || !confirm('Delete this goal?')) return;
      const goals = loadGoals().filter(g => g.id !== activeId);
      saveGoals(goals);
      closeDetail();
      renderAll();
    }

    // Enter key for step inputs
    document.getElementById('newDoneStep').addEventListener('keydown', e => { if (e.key === 'Enter') addStep('done'); });
    document.getElementById('newNextStep').addEventListener('keydown', e => { if (e.key === 'Enter') addStep('next'); });
    document.addEventListener('keydown', e => { if (e.key === 'Escape') closeDetail(); });

    // ── XSS guard ────────────────────────────────────────────────
    function esc(str) {
      return String(str)
        .replace(/&/g,'&amp;').replace(/</g,'&lt;')
        .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Init ─────────────────────────────────────────────────────
    renderAll();
  </script>

</body>
</html>
