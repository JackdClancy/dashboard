<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack's Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50:  '#EAF4FF',
              100: '#D2E9FF',
              400: '#409CFF',
              500: '#0A84FF',
              600: '#0066CC',
              700: '#0052A3',
              800: '#003D7A',
              900: '#002952',
            }
          }
        }
      }
    }
  </script>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }

    body { font-family: 'Fira Sans', sans-serif; background: #09090b; }

    #sidebar { transition: width 280ms cubic-bezier(.4,0,.2,1); }
    .sidebar-expanded  { width: 240px; }
    .sidebar-collapsed { width: 64px; }

    .nav-label { transition: opacity 200ms ease, width 200ms ease; white-space: nowrap; overflow: hidden; }
    .sidebar-collapsed .nav-label { opacity: 0; width: 0; }

    #mainContent { transition: margin-left 280ms cubic-bezier(.4,0,.2,1); }

    /* ── Phone layout: sidebar becomes a horizontal top bar ─────── */
    @media (max-width: 639px) {
      #sidebar {
        width: 100% !important;
        height: 4rem;
        left: 0;
        right: 0;
        flex-direction: row;
        border-right: 0;
        border-bottom-width: 1px;
      }
      #sidebar > div:first-child,
      #sidebar > div:last-child { display: none; }
      #sidebar nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-evenly;
        padding: 0 0.5rem;
        overflow-x: auto;
        overflow-y: hidden;
      }
      #sidebar nav > a { margin-top: 0; }
      #sidebar .nav-label { display: none; }
      #mainContent { margin-left: 0 !important; margin-top: 4rem; }
      #mainContent > header { top: 4rem; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0c0e; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* ── Ambient background glow ─────────────────────────────── */
    .bg-ambient { position: fixed; inset: 0; z-index: -10; overflow: hidden; background: #09090b; }
    .bg-ambient .blob { position: absolute; border-radius: 50%; filter: blur(120px); }

    /* ── Liquid glass surfaces ───────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.055);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .glass-strong {
      background: rgba(255,255,255,0.04);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      backdrop-filter: blur(32px) saturate(160%);
      border-color: rgba(255,255,255,0.10);
    }
  </style>
</head>

  <script>
    // ── Sidebar ──────────────────────────────────────────────────
    let expanded = false;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('mainContent');
      const icon    = document.getElementById('collapseIcon');
      expanded = !expanded;
      sidebar.classList.toggle('sidebar-expanded',  expanded);
      sidebar.classList.toggle('sidebar-collapsed', !expanded);
      main.classList.toggle('ml-60', expanded);
      main.classList.toggle('ml-16', !expanded);
      icon.innerHTML = expanded
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
      document.getElementById('sidebarToggle').setAttribute('aria-label', expanded ? 'Collapse sidebar' : 'Expand sidebar');
    }

    // ── Date + greeting ──────────────────────────────────────────
    const now      = new Date();
    const DAYS     = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];

    document.getElementById('headerDate').textContent =
      `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

    // ── Shared helpers ───────────────────────────────────────────
    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }
    function parseLocalDate(str) {
      const [y, m, d] = str.split('-').map(Number);
      return new Date(y, m - 1, d);
    }
    function todayMs() {
      const d = new Date(); d.setHours(0,0,0,0); return d.getTime();
    }

    // ── Workout week row (mirrors the Actual row on the Gym page) ────
    const WK_DAYS = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const today   = new Date(); today.setHours(0,0,0,0);

    function isoDate(d){
      const y=d.getFullYear(), m=String(d.getMonth()+1).padStart(2,'0'), day=String(d.getDate()).padStart(2,'0');
      return `${y}-${m}-${day}`;
    }
    function isToday(d){ return d.toDateString() === today.toDateString(); }

    function getMonday(d){
      const dt = new Date(d);
      const dow = dt.getDay();
      const diff = dow === 0 ? -6 : 1 - dow;
      dt.setDate(dt.getDate() + diff);
      return dt;
    }
    const monday = getMonday(today);
    const weekDates = WK_DAYS.map((_, i) => {
      const d = new Date(monday); d.setDate(monday.getDate() + i); return d;
    });

    const PLAN_KEY = 'gym_plan';
    function loadPlan(){ try { return JSON.parse(localStorage.getItem(PLAN_KEY)) || {}; } catch { return {}; } }

    function dayStatus(weekdayLabel, date, completedDates){
      if(!completedDates) return 'grey';
      const plan = loadPlan();
      const planned = !!(plan[weekdayLabel] && plan[weekdayLabel].trim());
      const completed = completedDates.has(isoDate(date));
      const future = date > today;
      if(completed) return 'green';
      if(future) return 'grey';
      if(planned) return 'red';
      return 'grey';
    }

    function statusClasses(status){
      if(status === 'green') return 'bg-emerald-500/5 shadow-[inset_0_0_22px_rgba(16,185,129,0.22)]';
      if(status === 'red')   return 'bg-red-500/5 shadow-[inset_0_0_22px_rgba(239,68,68,0.22)]';
      return '';
    }

    function dayCell(label, d, contentHtml, status){
      const t = isToday(d);
      return `<div class="p-3 text-center transition-shadow ${statusClasses(status)} ${t ? 'ring-1 ring-inset ring-primary-400/40' : ''}">
        <p class="text-sm font-bold ${t ? 'text-primary-300' : 'text-white/60'} mb-1.5">${label}</p>
        ${contentHtml}
      </div>`;
    }

    function placeholderContent(text){
      return `<p class="text-sm font-bold text-white/25 leading-snug">${esc(text)}</p>`;
    }

    function workoutsContent(entries){
      if(!entries || entries.length === 0) return placeholderContent('—');
      return entries.map(e => `
        <div class="mb-2 last:mb-0">
          <p class="text-sm font-bold text-white/85 leading-snug">${esc(e.title)}</p>
          <p class="text-xs text-white/45 font-mono font-semibold mt-0.5 max-sm:hidden">${e.volume.toLocaleString()} kg</p>
        </div>`).join('');
    }

    const HEVY_KEY = 'hevy_api_key';
    function loadHevyKey(){ return localStorage.getItem(HEVY_KEY) || ''; }

    function renderWorkoutPlaceholder(text){
      const el = document.getElementById('workoutGrid');
      el.innerHTML = WK_DAYS.map((label, i) => dayCell(label, weekDates[i], placeholderContent(text))).join('');
    }

    async function loadHomeWorkouts(){
      const key = loadHevyKey();
      if(!key){
        renderWorkoutPlaceholder('Connect Hevy');
        return;
      }
      renderWorkoutPlaceholder('Loading…');

      try {
        const res = await fetch('/api/hevy', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({ apiKey: key })
        });
        const data = await res.json();
        if(!res.ok) throw new Error(data.error || ('Request failed: '+res.status));

        const workouts = data.workouts || [];
        const byDate = {};
        workouts.forEach(w => {
          const raw = w.start_time || w.created_at;
          if(!raw) return;
          const dateKey = isoDate(new Date(raw));
          if(!byDate[dateKey]) byDate[dateKey] = [];
          byDate[dateKey].push({ title: w.title || 'Workout', volume: w.volume_kg || 0 });
        });
        const completedDates = new Set(Object.keys(byDate));

        const el = document.getElementById('workoutGrid');
        el.innerHTML = WK_DAYS.map((label, i) => {
          const d = weekDates[i];
          const entries = byDate[isoDate(d)] || [];
          const status = dayStatus(label, d, completedDates);
          return dayCell(label, d, workoutsContent(entries), status);
        }).join('');
      } catch(e){
        const el = document.getElementById('workoutGrid');
        el.innerHTML = `<div class="col-span-7 p-4 text-center text-xs text-red-400">Error: ${esc(e.message)}</div>`;
      }
    }

    function renderGoalColumn(elId, goals, label) {
      const el = document.getElementById(elId);
      if (!goals.length) {
        el.innerHTML = `<p class="text-sm text-white/30 text-center py-6">No ${label} goals yet.</p>`;
        return;
      }
      el.innerHTML = goals.map(g => {
        let bar = '';
        if (g.due) {
          const start = parseLocalDate(g.created).getTime();
          const end   = parseLocalDate(g.due).getTime();
          const total = end - start;
          if (total > 0) {
            const pct      = Math.min(100, Math.max(0, Math.round(((todayMs() - start) / total) * 100)));
            const daysLeft = Math.round((end - todayMs()) / 86400000);
            const color    = daysLeft < 0 ? 'bg-red-500' : pct >= 85 ? 'bg-amber-500' : pct >= 60 ? 'bg-yellow-400' : 'bg-emerald-500';
            const timeLabel = daysLeft < 0 ? `${Math.abs(daysLeft)}d overdue` : `${daysLeft}d left`;
            bar = `<div class="mt-2">
              <div class="flex justify-between text-[10px] mb-1">
                <span class="text-white/30 font-mono">${pct}%</span>
                <span class="${daysLeft < 0 ? 'text-red-400' : 'text-white/40'}">${timeLabel}</span>
              </div>
              <div class="w-full h-1 bg-white/10 rounded-full overflow-hidden">
                <div class="h-full ${color} rounded-full" style="width:${pct}%"></div>
              </div>
            </div>`;
          }
        }
        return `<div class="px-2 py-2 rounded-xl hover:bg-white/8 transition-colors">
          <p class="text-sm text-white/80">${esc(g.title)}</p>
          ${bar}
        </div>`;
      }).join('');
    }

    // ── Supabase (todos + goals, synced live) ────────────────────
    let supabaseClient = null;
    let todosCache = [];

    async function initSupabase() {
      const el = document.getElementById('todoList');
      try {
        const cfgRes = await fetch('/api/config');
        const cfg = await cfgRes.json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('Supabase is not configured');

        supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);

        await Promise.all([loadTodos(), loadHomeGoals()]);

        supabaseClient
          .channel('todos-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'todos' }, () => loadTodos())
          .subscribe();

        supabaseClient
          .channel('goals-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'goals' }, () => loadHomeGoals())
          .subscribe();
      } catch (e) {
        el.innerHTML = `<p class="text-sm text-red-400 text-center py-6">Couldn't connect: ${esc(e.message)}</p>`;
      }
    }

    async function loadHomeGoals() {
      const { data, error } = await supabaseClient
        .from('goals')
        .select('id, title, type, created, due, steps_done, steps_next')
        .order('created_at', { ascending: true });
      if (error) { console.error('Load goals failed:', error); return; }
      const goals = (data || []).map(row => ({
        id:        row.id,
        title:     row.title,
        type:      row.type,
        created:   row.created,
        due:       row.due || null,
        stepsDone: row.steps_done || [],
        stepsNext: row.steps_next || [],
      }));
      renderGoalColumn('longGoals',  goals.filter(g => g.type === 'long'),  'long-term');
      renderGoalColumn('shortGoals', goals.filter(g => g.type === 'short'), 'short-term');
    }

    async function loadTodos() {
      const { data, error } = await supabaseClient
        .from('todos')
        .select('*')
        .order('created_at', { ascending: true });
      if (error) {
        document.getElementById('todoList').innerHTML =
          `<p class="text-sm text-red-400 text-center py-6">Error: ${esc(error.message)}</p>`;
        return;
      }
      todosCache = data || [];
      renderTodos();
    }

    function renderTodos() {
      const el = document.getElementById('todoList');
      if (!todosCache.length) {
        el.innerHTML = '<p class="text-sm text-white/30 text-center py-6">Nothing on the list.</p>';
        return;
      }
      el.innerHTML = todosCache.map(t => `
        <label class="flex items-center gap-3 px-2 py-2 rounded-xl hover:bg-white/8 cursor-pointer group transition-colors">
          <input type="checkbox" onchange="completeTodo('${esc(t.id)}')"
                 class="w-4 h-4 rounded-full border-white/20 bg-white/5 cursor-pointer accent-blue-500 flex-shrink-0" />
          <span class="text-sm text-white/75 group-hover:text-white transition-colors">${esc(t.title)}</span>
        </label>`).join('');
    }

    async function addTodo() {
      const input = document.getElementById('todoInput');
      const text  = input.value.trim();
      if (!text || !supabaseClient) return;
      input.value = '';
      input.disabled = true;
      const { error } = await supabaseClient.from('todos').insert({ title: text });
      input.disabled = false;
      if (error) {
        console.error('Insert failed:', error);
        input.value = text;
        const el = document.getElementById('todoList');
        const prev = el.innerHTML;
        el.innerHTML = `<p class="text-sm text-red-400 text-center py-6">Failed to add task: ${esc(error.message)}</p>`;
        setTimeout(() => { el.innerHTML = prev; }, 4000);
        return;
      }
      await loadTodos();
    }

    async function completeTodo(id) {
      const { error } = await supabaseClient.from('todos').delete().eq('id', id);
      if (error) { console.error('Delete failed:', error); return; }
      loadTodos();
    }

    document.getElementById('todoInput').addEventListener('keydown', e => {
      if (e.key === 'Enter') addTodo();
    });

    initSupabase();
    loadHomeWorkouts();
  </script>

</body>
</html>
