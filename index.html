<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Jack's Dashboard</title>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Fira+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50:  '#EFF6FF',
              100: '#DBEAFE',
              400: '#60A5FA',
              500: '#3B82F6',
              600: '#2563EB',
              700: '#1D4ED8',
              800: '#1E40AF',
              900: '#1E3A8A',
            }
          }
        }
      }
    }
  </script>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }

    body { font-family: 'Fira Sans', sans-serif; }

    #sidebar { transition: width 280ms cubic-bezier(.4,0,.2,1); }
    .sidebar-expanded  { width: 240px; }
    .sidebar-collapsed { width: 64px; }

    .nav-label { transition: opacity 200ms ease, width 200ms ease; white-space: nowrap; overflow: hidden; }
    .sidebar-collapsed .nav-label { opacity: 0; width: 0; }

    #mainContent { transition: margin-left 280ms cubic-bezier(.4,0,.2,1); }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0f172a; }
    ::-webkit-scrollbar-thumb { background: #334155; border-radius: 4px; }
  </style>
</head>

<body class="bg-slate-950 text-slate-100 min-h-screen">

  <!-- ─── Sidebar ─────────────────────────────────────────────── -->
  <aside id="sidebar" class="sidebar-expanded fixed top-0 left-0 h-full bg-slate-900 border-r border-slate-800 z-30 flex flex-col select-none">

    <div class="flex items-center gap-3 px-4 py-5 border-b border-slate-800">
      <div class="w-8 h-8 rounded-lg bg-primary-700 flex items-center justify-center flex-shrink-0">
        <svg class="w-4 h-4 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
        </svg>
      </div>
      <span class="nav-label font-semibold text-slate-100 tracking-tight">Jack's Dashboard</span>
    </div>

    <nav class="flex-1 px-2 py-4 space-y-0.5 overflow-y-auto" aria-label="Main navigation">

      <a href="index.html"
         class="group flex items-center gap-3 px-3 py-2.5 rounded-lg text-primary-400 font-medium bg-primary-900/30 border-l-2 border-primary-500 cursor-pointer"
         aria-current="page">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="nav-label text-sm">Home</span>
      </a>

      <a href="gym.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12.75l7.5-7.5 7.5 7.5m-15 6l7.5-7.5 7.5 7.5" />
        </svg>
        <span class="nav-label text-sm">Gym</span>
      </a>

      <a href="finances.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>
        <span class="nav-label text-sm">Finances</span>
      </a>

      <a href="goals.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-lg text-slate-400 hover:text-slate-100 hover:bg-slate-800 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
        </svg>
        <span class="nav-label text-sm">Goals</span>
      </a>

    </nav>

    <div class="border-t border-slate-800 p-3">
      <button id="sidebarToggle" onclick="toggleSidebar()"
              class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-lg text-slate-500 hover:text-slate-300 hover:bg-slate-800 transition-colors duration-150 cursor-pointer"
              aria-label="Collapse sidebar">
        <svg id="collapseIcon" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7" />
        </svg>
        <span class="nav-label text-xs">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- ─── Main ─────────────────────────────────────────────────── -->
  <div id="mainContent" class="ml-60 min-h-screen flex flex-col">

    <header class="sticky top-0 z-20 bg-slate-900/95 backdrop-blur-sm border-b border-slate-800 px-6 py-3 flex items-center justify-between">
      <p id="headerDate" class="text-sm font-medium text-slate-400"></p>
      <div class="flex items-center gap-2.5">
        <div class="w-8 h-8 rounded-full bg-primary-700 flex items-center justify-center text-white text-xs font-semibold">JC</div>
        <span class="text-sm font-medium text-slate-300">Jack C.</span>
      </div>
    </header>

    <main class="flex-1 px-6 lg:px-8 py-6 space-y-5">

      <!-- Title -->
      <div>
        <h1 class="text-xl font-semibold text-slate-100">Overview</h1>
        <p id="greeting" class="text-sm text-slate-500 mt-0.5"></p>
      </div>

      <!-- ── Calendar ──────────────────────────────────────────── -->
      <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm p-5">
        <div class="flex items-center justify-between mb-4">
          <h2 id="calTitle" class="text-sm font-semibold text-slate-200"></h2>
          <div class="flex items-center gap-1">
            <button onclick="shiftMonth(-1)" aria-label="Previous month"
                    class="p-1.5 rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 19l-7-7 7-7"/></svg>
            </button>
            <button onclick="shiftMonth(1)" aria-label="Next month"
                    class="p-1.5 rounded-lg text-slate-500 hover:text-slate-200 hover:bg-slate-800 transition-colors">
              <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 5l7 7-7 7"/></svg>
            </button>
          </div>
        </div>
        <div id="calGrid"></div>
      </div>

      <!-- ── Goals row ─────────────────────────────────────────── -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

        <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm flex flex-col">
          <div class="px-5 py-4 border-b border-slate-800">
            <h2 class="text-sm font-semibold text-slate-200">Long-Term Goals</h2>
          </div>
          <div id="longGoals" class="flex-1 flex items-center justify-center py-10">
            <p class="text-sm text-slate-600">No long-term goals yet.</p>
          </div>
        </div>

        <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm flex flex-col">
          <div class="px-5 py-4 border-b border-slate-800">
            <h2 class="text-sm font-semibold text-slate-200">Short-Term Goals</h2>
          </div>
          <div id="shortGoals" class="flex-1 flex items-center justify-center py-10">
            <p class="text-sm text-slate-600">No short-term goals yet.</p>
          </div>
        </div>

      </div>

      <!-- ── Todo + Projects row ───────────────────────────────── -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-5">

        <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm flex flex-col">
          <div class="px-5 py-4 border-b border-slate-800">
            <h2 class="text-sm font-semibold text-slate-200">To-Do</h2>
          </div>
          <div id="todos" class="flex-1 flex items-center justify-center py-10">
            <p class="text-sm text-slate-600">Nothing on the list.</p>
          </div>
        </div>

        <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm flex flex-col">
          <div class="px-5 py-4 border-b border-slate-800">
            <h2 class="text-sm font-semibold text-slate-200">Current Projects</h2>
          </div>
          <div id="projects" class="flex-1 flex items-center justify-center py-10">
            <p class="text-sm text-slate-600">No active projects.</p>
          </div>
        </div>

      </div>

      <!-- ── Workout plan ──────────────────────────────────────── -->
      <div class="bg-slate-900 rounded-xl border border-slate-800 shadow-sm">
        <div class="px-5 py-4 border-b border-slate-800">
          <h2 class="text-sm font-semibold text-slate-200">Workout Plan</h2>
        </div>
        <div id="workoutGrid" class="grid grid-cols-7 divide-x divide-slate-800"></div>
      </div>

    </main>

    <footer class="px-6 py-4 border-t border-slate-800">
      <p class="text-xs text-slate-600">© 2026 Jack's Dashboard</p>
    </footer>
  </div>

  <script>
    // ── Sidebar ──────────────────────────────────────────────────
    let expanded = true;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('mainContent');
      const icon    = document.getElementById('collapseIcon');
      expanded = !expanded;
      sidebar.classList.toggle('sidebar-expanded',  expanded);
      sidebar.classList.toggle('sidebar-collapsed', !expanded);
      main.classList.toggle('ml-60', expanded);
      main.classList.toggle('ml-16', !expanded);
      icon.innerHTML = expanded
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
      document.getElementById('sidebarToggle').setAttribute('aria-label', expanded ? 'Collapse sidebar' : 'Expand sidebar');
    }

    // ── Date + greeting ──────────────────────────────────────────
    const now      = new Date();
    const DAYS     = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
    const MONTHS   = ['January','February','March','April','May','June','July','August','September','October','November','December'];
    const DAYS_ABR = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'];

    document.getElementById('headerDate').textContent =
      `${DAYS[now.getDay()]}, ${MONTHS[now.getMonth()]} ${now.getDate()} ${now.getFullYear()}`;

    const h = now.getHours();
    document.getElementById('greeting').textContent =
      (h < 12 ? 'Good morning' : h < 18 ? 'Good afternoon' : 'Good evening') + ', Jack.';

    // ── Calendar ─────────────────────────────────────────────────
    let calYear  = now.getFullYear();
    let calMonth = now.getMonth();

    function renderCalendar() {
      const firstDow    = new Date(calYear, calMonth, 1).getDay();
      const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
      const todayIsHere = calMonth === now.getMonth() && calYear === now.getFullYear();
      const todayDate   = now.getDate();

      document.getElementById('calTitle').textContent = `${MONTHS[calMonth]} ${calYear}`;

      let html = '<div class="grid grid-cols-7 mb-1">';
      ['Su','Mo','Tu','We','Th','Fr','Sa'].forEach(d => {
        html += `<div class="text-center text-[11px] font-medium text-slate-600 py-1">${d}</div>`;
      });
      html += '</div><div class="grid grid-cols-7 gap-y-0.5">';

      for (let i = 0; i < firstDow; i++) {
        html += '<div class="h-9"></div>';
      }
      for (let d = 1; d <= daysInMonth; d++) {
        if (todayIsHere && d === todayDate) {
          html += `<div class="h-9 flex items-center justify-center">
            <span class="w-8 h-8 flex items-center justify-center rounded-full bg-primary-600 text-white text-sm font-semibold">${d}</span>
          </div>`;
        } else {
          html += `<div class="h-9 flex items-center justify-center text-sm text-slate-400 hover:bg-slate-800 rounded-lg cursor-pointer transition-colors">${d}</div>`;
        }
      }
      html += '</div>';
      document.getElementById('calGrid').innerHTML = html;
    }

    function shiftMonth(dir) {
      calMonth += dir;
      if (calMonth > 11) { calMonth = 0; calYear++; }
      if (calMonth < 0)  { calMonth = 11; calYear--; }
      renderCalendar();
    }

    renderCalendar();

    // ── Workout week grid ────────────────────────────────────────
    const todayAbr = DAYS_ABR[now.getDay()];
    const WK_DAYS  = ['Mon','Tue','Wed','Thu','Fri','Sat','Sun'];
    const grid     = document.getElementById('workoutGrid');
    WK_DAYS.forEach(day => {
      const isToday = day === todayAbr;
      const col = document.createElement('div');
      col.className = 'p-4 min-h-[100px]' + (isToday ? ' bg-primary-900/40' : '');
      col.innerHTML = `
        <p class="text-xs font-semibold mb-3 ${isToday ? 'text-primary-400' : 'text-slate-500'}">${day}</p>
        <p class="text-xs text-slate-700">—</p>`;
      grid.appendChild(col);
    });
  </script>

</body>
</html>
