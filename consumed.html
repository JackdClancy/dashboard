<html lang="en">
<head>

  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fira+Code:wght@400;500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>

  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['Inter', 'Fira Sans', 'sans-serif'],
            mono: ['Fira Code', 'monospace'],
          },
          colors: {
            primary: {
              50:  '#EAF4FF',
              100: '#D2E9FF',
              400: '#409CFF',
              500: '#0A84FF',
              600: '#0066CC',
              700: '#0052A3',
              800: '#003D7A',
              900: '#002952',
            }
          }
        }
      }
    }
  </script>

  <style>
    @media (prefers-reduced-motion: reduce) {
      * { transition: none !important; animation: none !important; }
    }

    body { font-family: 'Fira Sans', sans-serif; background: #09090b; }

    #sidebar { transition: width 280ms cubic-bezier(.4,0,.2,1); }
    .sidebar-expanded  { width: 240px; }
    .sidebar-collapsed { width: 64px; }

    .nav-label { transition: opacity 200ms ease, width 200ms ease; white-space: nowrap; overflow: hidden; }
    .sidebar-collapsed .nav-label { opacity: 0; width: 0; }

    #mainContent { transition: margin-left 280ms cubic-bezier(.4,0,.2,1); }

    /* ── Phone layout: sidebar becomes a horizontal top bar ─────── */
    @media (max-width: 639px) {
      #sidebar {
        width: 100% !important;
        height: 4rem;
        left: 0;
        right: 0;
        flex-direction: row;
        border-right: 0;
        border-bottom-width: 1px;
      }
      #sidebar > div:first-child,
      #sidebar > div:last-child { display: none; }
      #sidebar nav {
        display: flex;
        flex-direction: row;
        align-items: center;
        justify-content: space-evenly;
        padding: 0 0.5rem;
        overflow-x: auto;
        overflow-y: hidden;
      }
      #sidebar nav > a { margin-top: 0; }
      #sidebar .nav-label { display: none; }
      #mainContent { margin-left: 0 !important; margin-top: 4rem; }
      #mainContent > header { top: 4rem; }
    }

    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: #0c0c0e; }
    ::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 4px; }

    /* ── Ambient background glow ─────────────────────────────── */
    .bg-ambient { position: fixed; inset: 0; z-index: -10; overflow: hidden; background: #09090b; }
    .bg-ambient .blob { position: absolute; border-radius: 50%; filter: blur(120px); }

    /* ── Liquid glass surfaces ───────────────────────────────── */
    .glass {
      background: rgba(255,255,255,0.055);
      -webkit-backdrop-filter: blur(28px) saturate(160%);
      backdrop-filter: blur(28px) saturate(160%);
      border: 1px solid rgba(255,255,255,0.10);
      box-shadow: 0 8px 32px rgba(0,0,0,0.45), inset 0 1px 0 rgba(255,255,255,0.10);
    }
    .glass-strong {
      background: rgba(255,255,255,0.04);
      -webkit-backdrop-filter: blur(32px) saturate(160%);
      backdrop-filter: blur(32px) saturate(160%);
      border-color: rgba(255,255,255,0.10);
    }
  </style>
  <link rel="stylesheet" href="theme.css" />
</head>

    <div class="blob w-[420px] h-[420px] bg-primary-500/15 top-1/3 -right-44"></div>
    <div class="blob w-[460px] h-[460px] bg-indigo-500/10 bottom-[-160px] left-1/3"></div>
  </div>

        <img src="logo-mark.png" alt="" class="w-7" />

    </div>

    <nav class="flex-1 px-2 py-4 space-y-1 overflow-y-auto" aria-label="Main navigation">

      <a href="index.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6" />
        </svg>
        <span class="nav-label text-sm">Home</span>
      </a>

      <a href="gym.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4.5 12.75l7.5-7.5 7.5 7.5m-15 6l7.5-7.5 7.5 7.5" />
        </svg>
        <span class="nav-label text-sm">Gym</span>
      </a>

      <a href="finances.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8c-1.657 0-3 .895-3 2s1.343 2 3 2 3 .895 3 2-1.343 2-3 2m0-8c1.11 0 2.08.402 2.599 1M12 8V7m0 1v8m0 0v1m0-1c-1.11 0-2.08-.402-2.599-1M21 12a9 9 0 11-18 0 9 9 0 0118 0z" />
        </svg>

      </a>

      <a href="goals.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-white/55 hover:text-white hover:bg-white/8 transition-colors duration-150 cursor-pointer">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4M7.835 4.697a3.42 3.42 0 001.946-.806 3.42 3.42 0 014.438 0 3.42 3.42 0 001.946.806 3.42 3.42 0 013.138 3.138 3.42 3.42 0 00.806 1.946 3.42 3.42 0 010 4.438 3.42 3.42 0 00-.806 1.946 3.42 3.42 0 01-3.138 3.138 3.42 3.42 0 00-1.946.806 3.42 3.42 0 01-4.438 0 3.42 3.42 0 00-1.946-.806 3.42 3.42 0 01-3.138-3.138 3.42 3.42 0 00-.806-1.946 3.42 3.42 0 010-4.438 3.42 3.42 0 00.806-1.946 3.42 3.42 0 013.138-3.138z" />
        </svg>
        <span class="nav-label text-sm">Goals</span>

      <a href="consumed.html"
         class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-primary-300 font-medium bg-primary-500/15 border border-primary-400/25 shadow-[0_0_16px_rgba(10,132,255,0.18)] cursor-pointer"
         aria-current="page">
        <svg class="w-5 h-5 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
        <span class="nav-label text-sm">Consumed</span>
      </a>

    </nav>

    <div class="border-t border-white/10 p-3">
      <button id="sidebarToggle" onclick="toggleSidebar()"
              class="w-full flex items-center justify-center gap-2 px-3 py-2 rounded-xl text-white/40 hover:text-white/80 hover:bg-white/8 transition-colors duration-150 cursor-pointer"
              aria-label="Expand sidebar">
        <svg id="collapseIcon" class="w-4 h-4 flex-shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor" aria-hidden="true">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7" />
        </svg>
        <span class="nav-label text-xs">Collapse</span>
      </button>
    </div>
  </aside>

  <!-- ─── Main ─────────────────────────────────────────────────── -->
  <div id="mainContent" class="ml-16 min-h-screen flex flex-col">

    <main class="flex-1 px-6 lg:px-8 py-6 flex flex-col gap-5">

      <div class="glass rounded-3xl flex flex-col">
        <div class="flex items-center justify-between px-5 py-4 border-b border-white/10">
          <div>
            <h2 class="text-sm font-semibold text-white/90">Recently Consumed</h2>
            <p class="text-xs text-white/35 mt-0.5">Everything the compile skill has filed into the vault's knowledge and thoughts folders.</p>
          </div>
          <span id="consumedCount" class="text-[10px] text-white/30 flex-shrink-0"></span>
        </div>

        <div class="overflow-x-auto">
          <table class="w-full min-w-[760px] text-left">
            <thead>
              <tr class="border-b border-white/10 text-[11px] uppercase tracking-wide text-white/35">
                <th class="px-5 py-3 font-medium">Title</th>
                <th class="px-4 py-3 font-medium">Source</th>
                <th class="px-4 py-3 font-medium w-[45%]">Essence</th>
                <th class="px-5 py-3 font-medium">Vault location</th>
              </tr>
            </thead>
            <tbody id="consumedRows">
              <tr><td colspan="4" class="px-5 py-10 text-sm text-white/30 text-center">Loading…</td></tr>
            </tbody>
          </table>
        </div>
      </div>

    </main>

    <footer class="px-6 py-4 border-t border-white/10">
      <p class="text-xs text-white/30">© 2026 Jack's Dashboard</p>
    </footer>
  </div>

  <script>
    // ── Sidebar ──────────────────────────────────────────────────
    let expanded = false;
    function toggleSidebar() {
      const sidebar = document.getElementById('sidebar');
      const main    = document.getElementById('mainContent');
      const icon    = document.getElementById('collapseIcon');
      expanded = !expanded;
      sidebar.classList.toggle('sidebar-expanded',  expanded);
      sidebar.classList.toggle('sidebar-collapsed', !expanded);
      main.classList.toggle('ml-60', expanded);
      main.classList.toggle('ml-16', !expanded);
      icon.innerHTML = expanded
        ? '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M11 19l-7-7 7-7m8 14l-7-7 7-7"/>'
        : '<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 5l7 7-7 7M5 5l7 7-7 7"/>';
      document.getElementById('sidebarToggle').setAttribute('aria-label', expanded ? 'Collapse sidebar' : 'Expand sidebar');
    }

    function esc(str) {
      return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
    }

    // ── Table: read-only mirror of app_state key 'consumed', written by
    //    the bridge (sync-consumed.mjs) from the vault's compiled notes. ──
    let supabaseClient = null;

    async function initSupabase() {
      const el = document.getElementById('consumedRows');
      try {
        const cfgRes = await fetch('/api/config');
        const cfg = await cfgRes.json();
        if (!cfg.supabaseUrl || !cfg.supabaseAnonKey) throw new Error('Supabase is not configured');

        supabaseClient = window.supabase.createClient(cfg.supabaseUrl, cfg.supabaseAnonKey);
        await loadConsumed();

        supabaseClient
          .channel('app-state-changes')
          .on('postgres_changes', { event: '*', schema: 'public', table: 'app_state' }, () => loadConsumed())
          .subscribe();
      } catch (e) {
        el.innerHTML = `<tr><td colspan="4" class="px-5 py-10 text-sm text-red-400 text-center">Couldn't connect: ${esc(e.message)}</td></tr>`;
      }
    }

    async function loadConsumed() {
      const { data, error } = await supabaseClient
        .from('app_state')
        .select('data')
        .eq('key', 'consumed')
        .maybeSingle();
      if (error) { console.error('Load consumed failed:', error); return; }
      renderConsumed(data?.data);
    }

    function renderConsumed(consumed) {
      const el = document.getElementById('consumedRows');
      const items = consumed?.items || [];
      if (!items.length) {
        el.innerHTML = '<tr><td colspan="4" class="px-5 py-10 text-sm text-white/30 text-center">Nothing compiled yet — capture something and run the vault compile skill.</td></tr>';
        return;
      }
      document.getElementById('consumedCount').textContent =
        `${items.length} item${items.length === 1 ? '' : 's'}`;

      const chip = k => k === 'thought' ? 'bg-violet-500/15 text-violet-300' : 'bg-sky-500/15 text-sky-300';
      el.innerHTML = items.map(i => `
        <tr class="border-b border-white/5 hover:bg-white/5 transition-colors align-top">
          <td class="px-5 py-3.5">
            <p class="text-sm text-white/85 font-medium leading-snug">${esc(i.title)}</p>
            <div class="flex items-center gap-2 mt-1.5">
              <span class="text-[10px] uppercase tracking-wide px-2 py-0.5 rounded-full ${chip(i.kind)}">${esc(i.kind)}</span>
              <span class="text-[11px] text-white/30">${esc(i.date)}</span>
            </div>
          </td>
          <td class="px-4 py-3.5">
            ${i.link
              ? `<a href="${esc(i.link)}" target="_blank" rel="noopener" class="text-sm text-primary-400 hover:text-primary-300 transition-colors leading-snug">${esc(i.source || 'Open link ↗')}</a>`
              : `<span class="text-sm text-white/40 leading-snug">${esc(i.source || '—')}</span>`}
          </td>
          <td class="px-4 py-3.5">
            <p class="text-sm text-white/60 leading-relaxed">${esc(i.essence || '—')}</p>
          </td>
          <td class="px-5 py-3.5">
            <span class="text-xs font-mono text-white/45 break-all">${esc(i.path || '—')}</span>
          </td>
        </tr>`).join('');
    }

    initSupabase();
  </script>

</body>
